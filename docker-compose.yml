services:
  postgres:
    image: postgres:15
    container_name: socniti-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-socniti_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-socniti_pass}
      POSTGRES_DB: ${POSTGRES_DB:-socniti_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    env_file:
      - .env
    ports:
      - "${AUTH_SERVICE_PORT:-4001}:4001"
    depends_on:
      - postgres

  event-service:
    build:
      context: .
      dockerfile: services/event-service/Dockerfile
    env_file:
      - .env
    ports:
      - "${EVENT_SERVICE_PORT:-4002}:4002"
    depends_on:
      - postgres

  chat-service:
    build:
      context: .
      dockerfile: services/chat-service/Dockerfile
    env_file:
      - .env
    ports:
      - "${CHAT_SERVICE_PORT:-4003}:4003"
    depends_on:
      - postgres

  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    env_file:
      - .env
    ports:
      - "${GATEWAY_PORT:-8080}:8080"
    depends_on:
      - auth-service
      - event-service
      - chat-service

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    env_file:
      - .env
    ports:
      - "5173:5173"
    depends_on:
      - api-gateway

volumes:
  postgres_data:
